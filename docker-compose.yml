version: '3.8'

services:
  # The AegisDesk FastAPI Backend & LangGraph Runner
  api:
    build: 
      context: .
      dockerfile: Dockerfile
    image: aegisdesk:latest
    container_name: aegisdesk_api
    ports:
      - "8000:8000"
    environment:
      # Pass through environment variables from the host's .env file
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-default_insecure_secret_for_local_testing}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    volumes:
      # Mount the data directory so SQLite Semantic Graph and logs persist across restarts
      - ./data:/app/data
    depends_on:
      - chromadb
    restart: unless-stopped

  # ChromaDB Vector Store for RAG Document Retrieval
  chromadb:
    image: chromadb/chroma:latest
    container_name: aegisdesk_chroma
    ports:
      - "8001:8000"
    volumes:
      # Persist Chroma embeddings
      - chromadata:/chroma/chroma
    restart: unless-stopped

volumes:
  chromadata:
